<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Escala</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; font-size: 1.15rem; font-weight: 600; color: #7dd3fc; margin-bottom: 14px; letter-spacing: 0.5px; }
  .card { background: #1e293b; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .selects { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { display: block; font-size: 0.68rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
  select { width: 100%; padding: 9px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; outline: none; -webkit-appearance: none; appearance: none; }
  select:focus { border-color: #38bdf8; }
  .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
  .nav-btn { background: #334155; border: none; color: #e2e8f0; border-radius: 8px; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .nav-btn:active { background: #475569; }
  .nav-label { font-weight: 600; font-size: 0.95rem; color: #7dd3fc; text-align: center; flex: 1; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dow { text-align: center; font-size: 0.68rem; font-weight: 700; color: #94a3b8; padding: 3px 0 5px; text-transform: uppercase; }
  .day { display: flex; flex-direction: column; align-items: center; padding: 3px 1px 4px; border-radius: 7px; background: #0f172a44; }
  .day.empty { background: transparent; }
  .day-n { font-size: 0.7rem; color: #cbd5e1; line-height: 1; margin-bottom: 2px; font-weight: 600; }
  .day.today { background: #1d3e5e; outline: 1.5px solid #38bdf855; }
  .day.today .day-n { color: #7dd3fc; font-weight: 700; }
  .chip { font-size: 0.62rem; font-weight: 700; border-radius: 4px; width: 100%; text-align: center; padding: 3px 0; line-height: 1.1; }
  .chip.M { background: #fef08a18; color: #fde047; border: 1px solid #fde04730; }
  .chip.T { background: #fb923c18; color: #fb923c; border: 1px solid #fb923c30; }
  .chip.N { background: #818cf818; color: #818cf8; border: 1px solid #818cf830; }
  .chip.F { background: #4ade8018; color: #4ade80; border: 1px solid #4ade8030; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 12px; justify-content: center; margin-top: 12px; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: #94a3b8; }
  .leg-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .empty-msg { grid-column: 1 / -1; text-align: center; color: #475569; font-size: 0.85rem; padding: 24px 0; }
  footer { text-align: center; color: #334155; font-size: 0.65rem; letter-spacing: 0.5px; padding: 16px 0 8px; }
  @media (min-width: 520px) {
    body { padding: 32px 24px; display: flex; flex-direction: column; align-items: center; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; }
    .card { max-width: 560px; width: 100%; padding: 24px; margin-bottom: 16px; border-radius: 18px; }
    .selects { gap: 16px; }
    select { font-size: 1rem; padding: 11px 14px; border-radius: 10px; }
    label { font-size: 0.75rem; margin-bottom: 6px; }
    .nav { margin-bottom: 18px; }
    .nav-btn { width: 46px; height: 46px; font-size: 1.3rem; border-radius: 10px; }
    .nav-label { font-size: 1.15rem; }
    .cal-grid { gap: 5px; }
    .dow { font-size: 0.95rem; padding: 6px 0 10px; color: #94a3b8; }
    .day { padding: 22px 4px 24px; border-radius: 10px; }
    .day-n { font-size: 1.1rem; margin-bottom: 10px; color: #cbd5e1; }
    .chip { font-size: 1.1rem; padding: 10px 0; border-radius: 6px; }
    .legend { margin-top: 18px; gap: 8px 20px; }
    .leg { font-size: 0.82rem; }
    .leg-dot { width: 11px; height: 11px; }
  }
</style>
</head>
<body>

<h1>📋 Consulta de Escala</h1>

<div class="card">
  <div class="selects">
    <div>
      <label>Escala</label>
      <select id="selEscala" onchange="updateLetras()">
        <option value="">Selecione...</option>
        <option value="4X2X4">4X2X4</option>
        <option value="4X1X3">4X1X3</option>
        <option value="4X2-6X4">4X2-6X4</option>
      </select>
    </div>
    <div>
      <label>Letra</label>
      <select id="selLetra" onchange="renderCal()">
        <option value="">Selecione...</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <div class="nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <span class="nav-label" id="mesAno"></span>
    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="cal-grid">
    <div class="dow">Dom</div><div class="dow">Seg</div><div class="dow">Ter</div>
    <div class="dow">Qua</div><div class="dow">Qui</div><div class="dow">Sex</div><div class="dow">Sáb</div>
  </div>
  <div class="cal-grid" id="cal">
    <div class="empty-msg">Selecione a escala e a letra</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#fde04766"></div>Manhã</div>
    <div class="leg"><div class="leg-dot" style="background:#fb923c66"></div>Tarde</div>
    <div class="leg"><div class="leg-dot" style="background:#818cf866"></div>Noite</div>
    <div class="leg"><div class="leg-dot" style="background:#4ade8066"></div>Folga</div>
  </div>
</div>

<footer>Developed by B.T.B.</footer>

const COL_IDX = {
  'A':0,'B':1,'C':2,'D':3,'E':4,'F':5,'G':6,'H':7,'I':8,'T':9,'C-G':10,
  'O':14,'P':15,'Q':16,'R':17,'V':18,'X':19,'Y':20,'Z':21,
  'AM':23,'BM':24,'CM':25,'DM':26,'EM':27,'FM':28,'GM':29,'HM':30,
  'AT':31,'BT':32,'CT':33,'DT':34,'ET':35,'FT':36,'GT':37,'HT':38
};

const LETRAS = {
  '4X2X4':   ['A','B','C','D','E','F','G','H','I','T','C-G'],
  '4X1X3':   ['O','P','Q','R','V','X','Y','Z'],
  '4X2-6X4': ['AM','BM','CM','DM','EM','FM','GM','HM','AT','BT','CT','DT','ET','FT','GT','HT']
};

function parseDate(s) {
  const [d,m,y] = s.split('/').map(Number);
  return new Date(y, m-1, d);
}

const baseDate = parseDate(rawData[0][0]);
const cycleLen = rawData.length;

function getOffsetA() {
  const ref = new Date(2026, 3, 30);
  const diff = Math.round((ref - baseDate) / 86400000);
  const rawIdx = ((diff % cycleLen) + cycleLen) % cycleLen;
  return ((5 - rawIdx) + cycleLen * 10) % cycleLen;
}
const OFFSET_A = getOffsetA();

const CYCLE16 = ['M1','M2','M3','M4','F1','F2','M1','M2','M3','M4','M5','M6','F1','F2','F3','F4'];
const POS_TODAY = {
  'AM':14,'AT':14,'BM':12,'BT':12,'CM':10,'CT':10,
  'DM':8,'DT':8,'EM':6,'ET':6,'FM':4,'FT':4,
  'GM':2,'GT':2,'HM':0,'HT':0
};
const TODAY_REF = new Date(2026, 3, 30);
const GROUP_B = new Set(Object.keys(POS_TODAY));

function getTurno(date, col, letra) {
  if (GROUP_B.has(letra)) {
    const isT = letra.endsWith('T');
    const diff = Math.round((date - TODAY_REF) / 86400000);
    const pos = ((POS_TODAY[letra] + diff) % 16 + 16) % 16;
    let v = CYCLE16[pos];
    return isT ? v.replace('M','T') : v;
  }
  const diff = Math.round((date - baseDate) / 86400000);
  const idx = (((diff % cycleLen) + cycleLen) % cycleLen + OFFSET_A) % cycleLen;
  const row = rawData[idx];
  return row ? row[col + 1] : '?';
}

let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function updateLetras() {
  const esc = document.getElementById('selEscala').value;
  const sel = document.getElementById('selLetra');
  sel.innerHTML = '<option value="">Selecione...</option>';
  if (LETRAS[esc]) LETRAS[esc].forEach(l => {
    const o = document.createElement('option');
    o.value = l; o.textContent = l; sel.appendChild(o);
  });
  renderCal();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderCal();
}

function renderCal() {
  const letra = document.getElementById('selLetra').value;
  document.getElementById('mesAno').textContent = `${MESES[curMonth]} ${curYear}`;
  const cal = document.getElementById('cal');

  if (!letra) {
    cal.innerHTML = '<div class="empty-msg">Selecione a escala e a letra</div>';
    return;
  }

  const col = COL_IDX[letra];
  const today = new Date();
  const lastDay = new Date(curYear, curMonth + 1, 0).getDate();
  const firstDow = new Date(curYear, curMonth, 1).getDay();

  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<div class="day empty"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const date = new Date(curYear, curMonth, d);
    const isToday = date.toDateString() === today.toDateString();
    const raw = getTurno(date, col, letra);
    const t = raw[0];
    const cls = ['M','T','N','F'].includes(t) ? t : '';
    html += `<div class="day${isToday?' today':''}"><div class="day-n">${d}</div><div class="chip ${cls}">${raw}</div></div>`;
  }
  cal.innerHTML = html;
}

renderCal();
